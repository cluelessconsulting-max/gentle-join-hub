<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OFFLIST — Private Events Network</title>
    <meta name="description" content="Join OFFLIST — an invitation-only network of curated private events in London, Paris, Milan and beyond. Apply for access.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://off-list.uk">
    <link rel="icon" href="/favicon.ico" />
    <link rel="sitemap" href="/sitemap.xml" type="application/xml">

    <!-- Preconnect & Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="OFFLIST — Private Events Network">
    <meta property="og:description" content="Curated private events in your city. Apply for exclusive access.">
    <meta property="og:image" content="https://off-list.uk/offlist-qr-card.png">
    <meta property="og:url" content="https://off-list.uk">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="OFFLIST — Private Events Network">
    <meta name="twitter:description" content="Curated private events in your city.">
    <meta name="twitter:image" content="https://off-list.uk/offlist-qr-card.png">

    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "OFFLIST",
      "url": "https://off-list.uk",
      "description": "An invitation-only network of curated private events.",
      "logo": "https://off-list.uk/offlist-qr-card.png"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
